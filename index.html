<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#C07838" />

    <title>Massive Inventions — Premium Wooden Audio & Accessories</title>
    <meta
      name="description"
      content="Handcrafted wooden speakers, earbuds, chargers, and cables. Warm acoustic instruments built for those who appreciate natural sound. Free shipping above ₹499."
    />
    <meta name="keywords" content="wooden speakers, handcrafted audio, premium earbuds, GaN chargers, audio accessories, Massive Inventions, India" />
    <meta name="author" content="Massive Inventions" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://massiveinvention.in/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Massive Inventions" />
    <meta property="og:title" content="Massive Inventions — Premium Wooden Audio & Accessories" />
    <meta property="og:description" content="Handcrafted wooden speakers and audio accessories. Warm acoustic instruments built for those who appreciate natural sound." />
    <meta property="og:url" content="https://massiveinvention.in/" />
    <meta property="og:image" content="https://massiveinvention.in/opengraph.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Massive Inventions — Premium Wooden Audio" />
    <meta name="twitter:description" content="Handcrafted wooden speakers, earbuds, chargers, and cables. Premium audio from India." />
    <meta name="twitter:image" content="https://massiveinvention.in/opengraph.jpg" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Fonts: preconnect for faster handshake -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Speed up audio file loading — they're large -->
    <link rel="preload" href="/audio/Pond.mp3" as="audio" type="audio/mpeg" />
  </head>
  <body>
    <div id="root"></div>

    <!-- Runtime config — must load BEFORE the main bundle so the API
         client can read the backend URL on startup. Override
         `apiUrl` here to point at a different backend (e.g. when
         deploying the static files to a host that isn't Vercel). -->
    <script src="/config.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
