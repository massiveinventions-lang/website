name: Deploy to Hostinger

on:
  push:
    branches:
      - main # This triggers the deployment when you push to the 'main' branch

jobs:
  web-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install Dependencies
        run: npm install --no-audit --no-fund

      - name: 🔨 Build Project
        env:
          # We pass GitHub Secrets into the build process so they are baked into the files
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_WEB3FORMS_KEY: ${{ secrets.VITE_WEB3FORMS_KEY }}
          VITE_RAZORPAY_KEY_ID: ${{ secrets.VITE_RAZORPAY_KEY_ID }}
        run: npm run build

      - name: 🔍 Verify Build Output
        run: ls -la dist/public/

      - name: 📂 Sync files to Hostinger via lftp
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          if [ -z "$FTP_SERVER" ] || [ -z "$FTP_USERNAME" ] || [ -z "$FTP_PASSWORD" ]; then
            echo "ERROR: FTP secrets are empty!"
            exit 1
          fi
          sudo apt-get install -y lftp
          
          # Strip ftp:// prefix if present - lftp open command needs bare hostname/IP
          SERVER=$(echo "$FTP_SERVER" | sed 's|^ftp://||' | sed 's|^ftps://||')
          echo "Connecting to FTP server: $SERVER"
          echo "FTP Username: $FTP_USERNAME"
          
          lftp -u "$FTP_USERNAME,$FTP_PASSWORD" \
            -e "set ftp:ssl-allow no; set net:timeout 30; set net:max-retries 3; set cmd:fail-exit yes; mirror -R --delete dist/public/ . --ignore-time --parallel=5 --verbose; quit" \
            "$SERVER"
