name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 📦 Install Dependencies
        run: pnpm install --filter massive-inventions

      - name: 🔨 Build Project
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_WEB3FORMS_KEY: ${{ secrets.VITE_WEB3FORMS_KEY }}
          VITE_RAZORPAY_KEY_ID: ${{ secrets.VITE_RAZORPAY_KEY_ID }}
        run: pnpm run build

      - name: 🔍 Verify Build Output
        run: |
          echo "=== Build files ==="
          ls -la dist/public/
          echo "=== Assets ==="
          ls -la dist/public/assets/ | head -20
          echo "=== index.html check ==="
          grep -c "script" dist/public/index.html && echo "index.html looks good"

      - name: 📂 Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Hostinger uses plain FTP (port 21). Do NOT use FTPS unless
          # the account explicitly requires TLS.
          protocol: ftp
          # Don't wipe the destination before each deploy — Hostinger
          # rate-limits FTP commands and `dangerous-clean-slate` can
          # exceed that limit on a large upload.
          dangerous-clean-slate: false
          local-dir: ./dist/public/
          server-dir: public_html/
          log-level: verbose
          timeout: 120000
          # Limit concurrent connections to stay under Hostinger's
          # per-IP rate limit.
          max-retries: 5
          retry-delay: 5000
