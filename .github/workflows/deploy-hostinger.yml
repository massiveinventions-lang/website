name: Deploy to Hostinger

on:
  push:
    branches:
      - main # This triggers the deployment when you push to the 'main' branch

jobs:
  web-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install Dependencies
        run: npm install --no-audit --no-fund

      - name: 🔨 Build Project
        env:
          # We pass GitHub Secrets into the build process so they are baked into the files
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_WEB3FORMS_KEY: ${{ secrets.VITE_WEB3FORMS_KEY }}
          VITE_RAZORPAY_KEY_ID: ${{ secrets.VITE_RAZORPAY_KEY_ID }}
        run: npm run build

      - name: 🔍 Verify Build Output
        run: ls -la dist/public/

      - name: 📂 Sync files to Hostinger via lftp
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          if [ -z "$FTP_SERVER" ] || [ -z "$FTP_USERNAME" ] || [ -z "$FTP_PASSWORD" ]; then
            echo "ERROR: One or more FTP secrets (FTP_SERVER, FTP_USERNAME, FTP_PASSWORD) are completely empty!"
            echo "Please go to GitHub Repository Settings -> Secrets and variables -> Actions, and add them!"
            exit 1
          fi
          
          sudo apt-get install -y lftp
          if [ ! -d "dist/public" ]; then
            echo "ERROR: dist/public directory does not exist!"
            exit 1
          fi
          echo "Syncing dist/public to current directory..."
          
          cat > deploy.lftp <<EOF
          set cmd:fail-exit yes
          set ftp:ssl-allow no
          set net:timeout 10
          set net:max-retries 2
          open -u "${FTP_USERNAME}","${FTP_PASSWORD}" "${FTP_SERVER}"
          mirror -R --delete dist/public/ . --ignore-time --parallel=10 --verbose
          quit
          EOF
          
          lftp -f deploy.lftp
